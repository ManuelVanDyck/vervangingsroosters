<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vervangingsrooster</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #ffffff;
            --header-bg: #1a1a2e;
            --header-text: #ffffff;
            --accent: #e94560;
            --day-badge-bg: #16213e;
            --day-badge-text: #e94560;
            --text: #1a1a2e;
            --text-secondary: #555;
            --shadow: 0 2px 12px rgba(0,0,0,0.15);
            --border: #e0e0e0;
            --table-header-bg: #16213e;
            --table-header-text: #ffffff;
            --table-row-alt: #f5f6fa;
            --table-row-hover: #eef0f5;
            --time-col-bg: #e8eaf0;

            --header-height: 80px;
            --logo-size: 1.8rem;
            --badge-size: 1rem;
            --clock-size: 0.95rem;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f0f1a;
                --header-bg: #0a0a15;
                --header-text: #e0e0e0;
                --accent: #ff6b81;
                --day-badge-bg: #1a1a30;
                --day-badge-text: #ff6b81;
                --text: #e0e0e0;
                --text-secondary: #999;
                --shadow: 0 2px 12px rgba(0,0,0,0.4);
                --border: #2a2a3a;
                --table-header-bg: #0d0d1a;
                --table-header-text: #e0e0e0;
                --table-row-alt: #161624;
                --table-row-hover: #1c1c2e;
                --time-col-bg: #11111e;
            }
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        header {
            background: var(--header-bg);
            color: var(--header-text);
            padding: 0 32px;
            height: var(--header-height);
            min-height: var(--header-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            z-index: 10;
            position: relative;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            font-size: var(--logo-size);
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--header-text);
        }

        .logo span {
            color: var(--accent);
        }

        .day-badge {
            background: var(--day-badge-bg);
            color: var(--day-badge-text);
            padding: 6px 20px;
            border-radius: 24px;
            font-size: var(--badge-size);
            font-weight: 600;
            white-space: nowrap;
        }

        .header-right {
            font-size: var(--clock-size);
            color: var(--header-text);
            opacity: 0.8;
            font-variant-numeric: tabular-nums;
        }

        /* ── Schedule table ── */
        main {
            flex: 1;
            overflow: hidden;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        .schedule-table {
            flex: 1;
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .schedule-table thead th {
            background: var(--table-header-bg);
            color: var(--table-header-text);
            font-size: clamp(1rem, 1.8vw, 1.5rem);
            font-weight: 600;
            padding: 16px 12px;
            text-align: left;
            border-bottom: 2px solid var(--accent);
            position: sticky;
            top: 0;
        }

        .schedule-table tbody td {
            font-size: clamp(0.9rem, 1.5vw, 1.4rem);
            padding: 14px 12px;
            border-bottom: 1px solid var(--border);
            line-height: 1.5;
            vertical-align: middle;
            word-wrap: break-word;
            white-space: pre-line;
        }

        .schedule-table tbody tr:nth-child(even) td {
            background: var(--table-row-alt);
        }

        /* Column B (time slot) — emphasised */
        .schedule-table tbody td.time-col {
            background: var(--time-col-bg);
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            text-align: center;
        }

        /* First column slightly narrower */
        .schedule-table th:first-child,
        .schedule-table td:first-child {
            width: 18%;
        }

        /* Empty cells get a subtle dash */
        .schedule-table tbody td:empty::after {
            content: '—';
            opacity: 0.3;
        }

        /* ── Weekend / no-schedule ── */
        .no-schedule {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            text-align: center;
            padding: 48px;
        }

        .no-schedule .icon {
            font-size: 6rem;
            margin-bottom: 24px;
            opacity: 0.6;
        }

        .no-schedule h2 {
            font-size: clamp(1.8rem, 3vw, 2.8rem);
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text);
        }

        .no-schedule p {
            font-size: clamp(1.1rem, 2vw, 1.5rem);
            color: var(--text-secondary);
            max-width: 500px;
            line-height: 1.5;
        }

        /* ── Loading ── */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── Error ── */
        .error-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            text-align: center;
            padding: 48px;
        }

        .error-state .icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }

        /* ── Mobile ── */
        @media (max-width: 768px) {
            :root {
                --header-height: 56px;
                --logo-size: 1.2rem;
                --badge-size: 0.8rem;
                --clock-size: 0.75rem;
            }
            header {
                padding: 0 16px;
            }
            .header-left {
                gap: 12px;
            }
            .day-badge {
                padding: 4px 14px;
            }
            .schedule-table thead th {
                font-size: 0.85rem;
                padding: 8px 6px;
            }
            .schedule-table tbody td {
                font-size: 0.75rem;
                padding: 8px 6px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <div class="logo">📋 Vervangings<span>rooster</span></div>
            <div class="day-badge" id="dayBadge">…</div>
        </div>
        <div class="header-right" id="clock">--:--</div>
    </header>

    <main id="main">
        <div class="loading"><div class="spinner"></div></div>
    </main>

    <script>
        (function () {
            // ── Config ──
            const CSV_BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR5N6LWtAsfe7-2Wl1YCGnv6PaPwlxwTcEtLWGQETjLrnjpPvr5FsDanXo_QXAc74uanJLhb9fZ4g_w/pub';

            // gid + cell range per weekday
            const SCHEDULES = {
                1: { gid: '702076612',  label: 'Maandag',   range: { startRow: 4, endRow: 12, startCol: 1, endCol: 6 } },
                2: { gid: '454824552',  label: 'Dinsdag',   range: { startRow: 4, endRow: 12, startCol: 1, endCol: 6 } },
                3: { gid: '1769592879', label: 'Woensdag',  range: { startRow: 4, endRow: 9,  startCol: 1, endCol: 6 } },
                4: { gid: '1340590586', label: 'Donderdag', range: { startRow: 4, endRow: 12, startCol: 1, endCol: 6 } },
                5: { gid: '4978925',    label: 'Vrijdag',   range: { startRow: 4, endRow: 12, startCol: 1, endCol: 6 } },
            };

            const DAY_NAMES = ['Zondag', 'Maandag', 'Dinsdag', 'Woensdag', 'Donderdag', 'Vrijdag', 'Zaterdag'];

            const main = document.getElementById('main');
            const dayBadge = document.getElementById('dayBadge');
            const clockEl = document.getElementById('clock');

            // ── Clock ──
            function updateClock() {
                const now = new Date();
                clockEl.textContent = now.toLocaleTimeString('nl-BE', { hour: '2-digit', minute: '2-digit' });
            }
            updateClock();
            setInterval(updateClock, 10000);

            // ── CSV parser (handles quoted fields, embedded newlines) ──
            function parseCSV(text) {
                const rows = [];
                let row = [];
                let cell = '';
                let inQuotes = false;

                for (let i = 0; i < text.length; i++) {
                    const ch = text[i];

                    if (inQuotes) {
                        if (ch === '"') {
                            if (text[i + 1] === '"') {
                                cell += '"';
                                i++;
                            } else {
                                inQuotes = false;
                            }
                        } else {
                            cell += ch;
                        }
                    } else {
                        if (ch === '"') {
                            inQuotes = true;
                        } else if (ch === ',') {
                            row.push(cell);
                            cell = '';
                        } else if (ch === '\n') {
                            row.push(cell);
                            rows.push(row);
                            row = [];
                            cell = '';
                        } else if (ch !== '\r') {
                            cell += ch;
                        }
                    }
                }
                // Last cell/row
                if (cell.length > 0 || row.length > 0) {
                    row.push(cell);
                    rows.push(row);
                }
                return rows;
            }

            // ── Extract cells from parsed CSV ──
            function extractRange(csvData, range) {
                const { startRow, endRow, startCol, endCol } = range;
                const result = [];
                // CSV rows are 0-indexed, spreadsheet rows are 1-indexed
                for (let r = startRow - 1; r <= endRow - 1 && r < csvData.length; r++) {
                    const csvRow = csvData[r] || [];
                    const extracted = [];
                    for (let c = startCol; c <= endCol; c++) {
                        extracted.push((csvRow[c] || '').trim());
                    }
                    // Skip fully empty rows
                    if (extracted.some(v => v.length > 0)) {
                        result.push(extracted);
                    }
                }
                return result;
            }

            // ── Detect if row is a header row ──
            function looksLikeHeader(cells) {
                const joined = cells.join(' ').toUpperCase();
                return joined.includes('LESUUR') || joined.includes('AFWEZIGE') || joined.includes('STUDIE');
            }

            // ── Render table ──
            function renderTable(data) {
                let html = '<table class="schedule-table">';

                data.forEach((row, rowIdx) => {
                    // If row looks like header, render as thead
                    if (rowIdx === 0 && looksLikeHeader(row)) {
                        html += '<thead><tr>';
                        row.forEach(cell => {
                            html += `<th>${escapeHtml(cell)}</th>`;
                        });
                        html += '</tr></thead><tbody>';
                    } else {
                        html += '<tr>';
                        row.forEach((cell, colIdx) => {
                            const cls = colIdx === 0 ? ' class="time-col"' : '';
                            html += `<td${cls}>${escapeHtml(cell)}</td>`;
                        });
                        html += '</tr>';
                    }
                });

                // Close tbody if we had a header, otherwise wrap body rows
                if (data.length > 0 && looksLikeHeader(data[0])) {
                    html += '</tbody>';
                }

                html += '</table>';
                return html;
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            // ── Day detection ──
            const today = new Date();
            const dayIndex = today.getDay();
            const dayName = DAY_NAMES[dayIndex];
            const schedule = SCHEDULES[dayIndex];

            dayBadge.textContent = dayName;

            if (!schedule) {
                main.innerHTML = `
                    <div class="no-schedule">
                        <div class="icon">🏖️</div>
                        <h2>Geen rooster vandaag</h2>
                        <p>Het is ${dayName.toLowerCase()}. Het vervangingsrooster is er weer op maandag.</p>
                    </div>
                `;
                return;
            }

            // ── Fetch CSV and render ──
            const csvUrl = `${CSV_BASE}?gid=${schedule.gid}&single=true&output=csv`;

            fetch(csvUrl)
                .then(res => {
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    return res.text();
                })
                .then(csvText => {
                    const csvData = parseCSV(csvText);
                    const cellData = extractRange(csvData, schedule.range);

                    if (cellData.length === 0) {
                        main.innerHTML = `
                            <div class="no-schedule">
                                <div class="icon">📭</div>
                                <h2>Geen vervangingen vandaag</h2>
                                <p>Het rooster is leeg voor ${schedule.label.toLowerCase()}.</p>
                            </div>
                        `;
                        return;
                    }

                    main.innerHTML = renderTable(cellData);
                    dayBadge.textContent = schedule.label;
                })
                .catch(err => {
                    console.error('Fetch error:', err);
                    main.innerHTML = `
                        <div class="error-state">
                            <div class="icon">⚠️</div>
                            <h2>Rooster kan niet geladen worden</h2>
                            <p style="font-size:1.2rem;color:var(--text-secondary);">${escapeHtml(err.message)}</p>
                        </div>
                    `;
                });

            // ── Auto-refresh every 5 minutes ──
            setInterval(function () {
                location.reload();
            }, 5 * 60 * 1000);
        })();
    </script>

</body>
</html>
